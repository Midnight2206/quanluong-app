map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    '' $scheme;
}

# Không dùng biến trong proxy_pass — với resolver + $host Nginx có thể không gửi đúng URI tới upstream.
upstream quanluong_api {
    server app:3000;
    keepalive 8;
}

# Socket.io — cổng riêng trên container `app` (SOCKET_PORT, mặc định 3030).
upstream quanluong_socket {
    server app:3030;
    keepalive 8;
}

server {
    listen 80;
    server_name _;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # `/api/midnight-secret/*` la Next.js BFF: kiem tra gate cookie, user session,
    # roi moi forward sang backend kem header noi bo.
    location /api/midnight-secret/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location /api/ {
        proxy_pass http://quanluong_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location /socket.io/ {
        proxy_pass http://quanluong_socket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_connect_timeout 5s;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    location /media/avatars/ {
        alias /data/media/avatars/;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_read_timeout 60s;
    }
}
