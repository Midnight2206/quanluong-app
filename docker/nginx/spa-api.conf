server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Docker DNS — resolve lại mỗi `valid` giây (mặc định nginx cache IP upstream vĩnh viễn → sau recreate container
    # hostname `app` có thể trỏ nhầm IP cũ / container khác → 502 Connection refused).
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $api_upstream app:3000;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Chỉ public thư mục avatar (staging không được phơi qua URL)
    location /media/avatars/ {
        alias /data/media/avatars/;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
