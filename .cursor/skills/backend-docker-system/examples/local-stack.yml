version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npx prisma migrate deploy && npm run dev"
    environment:
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: mysql://root:root@db:3306/quanluong
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: change-me
      SESSION_SECRET: change-me
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run worker
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://root:root@db:3306/quanluong
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run scheduler
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://root:root@db:3306/quanluong
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: quanluong
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mariadb_data:
